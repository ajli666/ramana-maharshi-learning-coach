<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAE Wiki: 學習教練互動式儀表板空間</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0a0b10;
            --bg-sidebar: #101118;
            --bg-card: #161722;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.2);
            --border: #222533;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --text-muted: #4b5563;
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg-primary: #f1f5f9;
            --bg-sidebar: #ffffff;
            --bg-card: #f8fafc;
            --accent: #4f46e5;
            --accent-glow: rgba(79, 70, 229, 0.1);
            --border: #cbd5e1;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
            transition: var(--transition);
        }

        /* Sidebar Styling */
        .sidebar {
            width: 320px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: var(--transition);
            z-index: 10;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--text-primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .theme-toggle {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-primary);
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .theme-toggle:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .menu-list {
            padding: 20px;
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            flex-grow: 1;
        }

        .menu-item {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .menu-item:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .menu-item.active {
            border-color: var(--accent);
            background-color: var(--accent-glow);
        }

        .menu-item-title {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-primary);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .menu-item-title i {
            color: var(--accent);
        }

        .menu-item-desc {
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        /* Workspace (Main panel) */
        .workspace {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            background-color: var(--bg-primary);
        }

        /* Tab bar on top of the iframe workspace */
        .control-bar {
            height: 60px;
            background-color: var(--bg-sidebar);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            flex-shrink: 0;
        }

        .layout-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .control-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
        }

        .control-btn:hover, .control-btn.active {
            border-color: var(--accent);
            color: var(--text-primary);
            background-color: var(--accent-glow);
        }

        /* Iframe Containers (Flexible for single/split layouts) */
        .iframe-container {
            flex-grow: 1;
            display: flex;
            position: relative;
            background-color: var(--bg-primary);
        }

        .pane {
            flex: 1;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            transition: var(--transition);
        }

        .pane:last-child {
            border-right: none;
        }

        .pane-header {
            background-color: var(--bg-sidebar);
            border-bottom: 1px solid var(--border);
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .pane-header select {
            background-color: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            outline: none;
            cursor: pointer;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: transparent;
        }

        /* Sidebar toggle for mobile */
        .sidebar-toggle-btn {
            display: none;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                left: -320px;
                height: 100%;
            }
            .sidebar.open {
                left: 0;
            }
            .sidebar-toggle-btn {
                display: flex;
            }
        }
    </style>
</head>
<body>

    <!-- Sidebar: Dashboard Hub List -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i class="fa-solid fa-graduation-cap"></i> Coach Hub
            </div>
            <button class="theme-toggle" id="theme-toggle" title="切換主題">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>
        <ul class="menu-list">
            <li class="menu-item active" onclick="loadDashboard('ramana-maharshi-turiya-coach.html', 'pane-left', this)">
                <div class="menu-item-title">
                    <i class="fa-solid fa-spa"></i> Turiya: 覺醒與自我探究
                </div>
                <div class="menu-item-desc">馬哈希第四態（Turiya）修持、6步自我探究 SOP 與防錯反模式。</div>
            </li>
            <li class="menu-item" onclick="loadDashboard('laozi-dds-coach.html', 'pane-left', this)">
                <div class="menu-item-title">
                    <i class="fa-solid fa-yin-yang"></i> 老子: DDS 防禦性決策
                </div>
                <div class="menu-item-desc">為道日損、無為而無不為、上善若水守柔處下決策與學習系統。</div>
            </li>
            <li class="menu-item" onclick="loadDashboard('eckhart-tolle-now-coach.html', 'pane-left', this)">
                <div class="menu-item-title">
                    <i class="fa-solid fa-leaf"></i> 托勒: 當下的學習力
                </div>
                <div class="menu-item-desc">臨在觀察思考者、無念間隙特訓、內在身體專注定錨與21天工作坊。</div>
            </li>
        </ul>
    </aside>

    <!-- Main Workspace -->
    <main class="workspace">
        <!-- Control bar on top -->
        <div class="control-bar">
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="control-btn sidebar-toggle-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i> 選單</button>
                <div style="font-weight: 700; font-size: 1.05rem;" id="workspace-title">學習教練工作區</div>
            </div>
            
            <div class="layout-controls">
                <button class="control-btn active" id="layout-single" onclick="changeLayout('single')">
                    <i class="fa-solid fa-window-maximize"></i> 單頁模式
                </button>
                <button class="control-btn" id="layout-split" onclick="changeLayout('split')">
                    <i class="fa-solid fa-columns"></i> 左右對照
                </button>
            </div>
        </div>

        <!-- Dashboard Viewport -->
        <div class="iframe-container" id="iframe-container">
            <!-- Left Pane (Always active) -->
            <div class="pane" id="pane-left">
                <div class="pane-header" id="pane-header-left" style="display: none;">
                    <span>左側視窗</span>
                    <select onchange="onPaneSelectChange('pane-left', this.value)" id="select-left">
                        <option value="ramana-maharshi-turiya-coach.html">Turiya: 覺醒與自我探究</option>
                        <option value="laozi-dds-coach.html">老子: DDS 防禦性決策</option>
                        <option value="eckhart-tolle-now-coach.html">托勒: 當下的學習力</option>
                    </select>
                </div>
                <iframe src="ramana-maharshi-turiya-coach.html" name="iframe-left" id="iframe-left"></iframe>
            </div>

            <!-- Right Pane (Active only during split screen) -->
            <div class="pane" id="pane-right" style="display: none;">
                <div class="pane-header">
                    <span>右側視窗 (對照)</span>
                    <select onchange="onPaneSelectChange('pane-right', this.value)" id="select-right">
                        <option value="ramana-maharshi-turiya-coach.html">Turiya: 覺醒與自我探究</option>
                        <option value="laozi-dds-coach.html">老子: DDS 防禦性決策</option>
                        <option value="eckhart-tolle-now-coach.html">托勒: 當下的學習力</option>
                    </select>
                </div>
                <iframe src="ramana-maharshi-turiya-coach.html" name="iframe-right" id="iframe-right"></iframe>
            </div>
        </div>
    </main>

    <script>
        // Layout Toggle Logic
        let currentLayout = 'single';

        function changeLayout(type) {
            currentLayout = type;
            const paneRight = document.getElementById('pane-right');
            const paneHeaderLeft = document.getElementById('pane-header-left');
            const btnSingle = document.getElementById('layout-single');
            const btnSplit = document.getElementById('layout-split');

            if (type === 'single') {
                paneRight.style.display = 'none';
                paneHeaderLeft.style.display = 'none';
                btnSingle.classList.add('active');
                btnSplit.classList.remove('active');
            } else {
                paneRight.style.display = 'flex';
                paneHeaderLeft.style.display = 'flex';
                btnSingle.classList.remove('active');
                btnSplit.classList.add('active');
            }
        }

        // Sidebar Navigation click logic
        function loadDashboard(url, targetPaneId, menuItem) {
            // Update Active Menu State
            document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
            menuItem.classList.add('active');

            if (currentLayout === 'single') {
                document.getElementById('iframe-left').src = url;
                document.getElementById('select-left').value = url;
            } else {
                // If in split mode, let user choose where to load it, or default to left
                document.getElementById('iframe-left').src = url;
                document.getElementById('select-left').value = url;
            }

            // Close mobile sidebar if open
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.remove('open');
        }

        // Dropdown selection sync logic
        function onPaneSelectChange(paneId, url) {
            if (paneId === 'pane-left') {
                document.getElementById('iframe-left').src = url;
                // Sync sidebar active state if possible
                syncSidebarState(url);
            } else {
                document.getElementById('iframe-right').src = url;
            }
        }

        function syncSidebarState(url) {
            const menuItems = document.querySelectorAll('.menu-item');
            menuItems.forEach(item => {
                const clickAttr = item.getAttribute('onclick');
                if (clickAttr && clickAttr.includes(url)) {
                    menuItems.forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                }
            });
        }

        // Mobile Sidebar Toggle
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('open');
        }

        // Theme Toggle Logic
        const themeToggle = document.getElementById('theme-toggle');
        const root = document.documentElement;

        themeToggle.addEventListener('click', () => {
            const currentTheme = root.getAttribute('data-theme');
            if (currentTheme === 'light') {
                root.removeAttribute('data-theme');
                themeToggle.innerHTML = '<i class="fa-solid fa-moon"></i>';
                // Trigger dark theme inside iframes if supported
                setIframesTheme('dark');
            } else {
                root.setAttribute('data-theme', 'light');
                themeToggle.innerHTML = '<i class="fa-solid fa-sun"></i>';
                setIframesTheme('light');
            }
        });

        function setIframesTheme(theme) {
            const frames = [document.getElementById('iframe-left'), document.getElementById('iframe-right')];
            frames.forEach(frame => {
                try {
                    if (frame && frame.contentWindow && frame.contentWindow.document) {
                        const htmlNode = frame.contentWindow.document.documentElement;
                        const btnToggle = frame.contentWindow.document.getElementById('theme-toggle');
                        if (theme === 'light') {
                            htmlNode.setAttribute('data-theme', 'light');
                            if (btnToggle) btnToggle.innerHTML = '<i class="fa-solid fa-sun"></i>';
                        } else {
                            htmlNode.removeAttribute('data-theme');
                            if (btnToggle) btnToggle.innerHTML = '<i class="fa-solid fa-moon"></i>';
                        }
                    }
                } catch(e) {
                    console.log("Could not toggle iframe theme due to cross-origin or load timing restrictions.");
                }
            });
        }
    </script>
</body>
</html>
